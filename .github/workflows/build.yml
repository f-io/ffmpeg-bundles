name: ffplay bundles

on:
  workflow_dispatch:

jobs:
  win_x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            pkg-config
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-nasm

      - name: Build ffplay
        shell: msys2 {0}
        run: |
          set -euo pipefail
          rm -rf FFmpeg
          git clone --depth 1 https://github.com/FFmpeg/FFmpeg.git
          cd FFmpeg

          ./configure \
            --prefix="$PWD/out" \
            --target-os=mingw32 \
            --arch=x86_64 \
            --enable-ffplay \
            --disable-ffmpeg \
            --disable-ffprobe \
            --disable-doc \
            --disable-debug \
            --enable-sdl2

          make -j"$(nproc)"
          make install

      - name: Package
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd FFmpeg
          mkdir -p bundle/win-x64/bin
          cp -v out/bin/ffplay.exe bundle/win-x64/bin/

          MINGW_BIN="/mingw64/bin"
          for f in SDL2.dll libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            cp -v "$MINGW_BIN/$f" bundle/win-x64/bin/
          done

          cd bundle
          powershell.exe -NoProfile -Command "Compress-Archive -Path win-x64 -DestinationPath ..\\ffplay-win-x64.zip -Force"

      - uses: actions/upload-artifact@v4
        with:
          name: ffplay-win-x64
          path: FFmpeg/ffplay-win-x64.zip

  macos_arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          brew update >/dev/null
          brew install sdl2 nasm pkg-config

      - name: Build ffplay
        shell: bash
        run: |
          set -euo pipefail
          rm -rf FFmpeg
          git clone --depth 1 https://github.com/FFmpeg/FFmpeg.git
          cd FFmpeg

          ./configure \
            --prefix="$PWD/out" \
            --enable-ffplay \
            --disable-ffmpeg \
            --disable-ffprobe \
            --disable-doc \
            --disable-debug \
            --enable-sdl2

          make -j"$(sysctl -n hw.ncpu)"
          make install

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cd FFmpeg
          mkdir -p bundle/macos-arm64/bin
          cp -v out/bin/ffplay bundle/macos-arm64/bin/
          cd bundle
          zip -r ../ffplay-macos-arm64.zip macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: ffplay-macos-arm64
          path: FFmpeg/ffplay-macos-arm64.zip